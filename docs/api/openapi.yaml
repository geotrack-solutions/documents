      summary: Obtener clientes
      tags:
      - clients
      parameters:
      - name: limit
        in: query
        required: false
        description: opcional, limita la cantidad de registros de clientes que retorna
          el ws. Si no se envia se retornaran todos
        example: '10'
        schema:
          type: integer
      - name: api-token
        in: header
        required: false
        example: 
        schema:
          type: string
      responses: {}
      operationId: getClients
