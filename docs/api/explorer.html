<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">
  <style> html,body{height:100%;margin:0} #swagger{height:100vh} </style>
</head>
<body>
  <div id="swagger"></div>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script>
    // Read ?op=/tag/operationId from Docsify's hash or real querystring
    function readOpFromUrl(){
      const hash = window.location.hash || '';
      let query = '';
      const qIndex = hash.indexOf('?');
      if (qIndex >= 0) query = hash.slice(qIndex + 1);
      else if (window.location.search.length > 1) query = window.location.search.slice(1);
      const params = new URLSearchParams(query);
      return params.get('op') || '';
    }
    function normalizeOp(op){
      const parts = op.replace(/^\//,'').split('/');
      return { tag: parts[0] || '', opId: parts[1] || '' };
    }
    function scrollToOperation(tag, opId, attempt=0){
      const t = tag.toLowerCase(), o = opId.toLowerCase();
      const nodes = document.querySelectorAll('[id^="operations-"]');
      for (const el of nodes){
        const id = (el.id || '').toLowerCase();
        if (id === `operations-${t}-${o}` || (id.includes(`operations-${t}-`) && id.endsWith(`-${o}`))){
          el.scrollIntoView({behavior:'smooth', block:'start'}); return true;
        }
      }
      if (attempt < 25) setTimeout(()=>scrollToOperation(tag, opId, attempt+1), 200);
      return false;
    }
    const ui = SwaggerUIBundle({
      url: './api/openapi.yaml',   // resolves correctly both inside Docsify and direct-load

//      url: 'openapi.yaml',
      dom_id: '#swagger',
      deepLinking: false,      // avoid nested-hash conflicts with Docsify
      displayOperationId: true,
      docExpansion: 'none',
      filter: true
    });
    function handleRoute(){
      const raw = readOpFromUrl();
      if (!raw) return;
      const { tag, opId } = normalizeOp(raw);
      if (tag && opId) scrollToOperation(tag, opId);
    }
    setTimeout(handleRoute, 300);
    window.addEventListener('hashchange', handleRoute);
  </script>
</body>
</html>
