<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>API Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">
  <style> body { margin: 0; } #swagger { height: 100vh; }</style>
</head>
<body>
  <div id="swagger"></div>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <!--script>
    window.ui = SwaggerUIBundle({
      url: 'openapi.yaml',
      dom_id: '#swagger',
      deepLinking: true,
      displayOperationId: true,
      docExpansion: 'none',
      filter: true
    });
</script-->
  <script>
  const op = new URLSearchParams(location.search).get('op'); // e.g. "/clients/getClients"
  const ui = SwaggerUIBundle({ url: 'openapi.yaml', dom_id: '#swagger', deepLinking: false, docExpansion: 'none' });
  // Wait a tick for UI to render, then scroll to the operation block by id.
  ui.initOAuth && setTimeout(() => {
    if (!op) return;
    // Swagger gives each operation an id like "operations-{tag}-{operationId}"
    const id = 'operations-' + op.replace(/^\//,'').replace('/', '-'); // crude map: "/tag/opId" -> "operations-tag-opId"
    const el = document.getElementById(id);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  }, 600);
</script>

</body>
</html>
