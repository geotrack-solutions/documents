<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Docs</title>
  <!-- Theme (docsify-themeable) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <!-- Optional: copy code button styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-copy-code@3/styles.css">
  <style>
    :root { --theme-color: #0ea5e9; } /* Tailwind sky-500 */
  </style>
</head>
<body>
  <div id="app">Loading…</div>
  <script>
    window.$docsify = {
      name: 'ForceSOS',
      logo: '_media/banner.svg',
      repo: '',
      loadSidebar: '_sidebar.md',
      loadNavbar: true,
      subMaxLevel: 3,
      executeScript: true,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '_sidebar.md',
        '/.*/_navbar.md': '_navbar.md'
      },
      search: {
        maxAge: 86400000, // 1 day cache
        paths: 'auto',
        placeholder: 'Search',
        noData: 'No results'
      }
    };
  </script>
  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
  <!-- OpenAPI via Swagger-UI plugin -->
  <!--script src="https://unpkg.com/docsify-swagger-ui@2.0.3/dist/index.min.js"></script-->
</body>
</html>
